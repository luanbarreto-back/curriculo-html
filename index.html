<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calculadora</title>

<style>
body{
    font-family: Arial;
    background:#1e1e1e;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculadora{
    background:#2b2b2b;
    padding:20px;
    border-radius:10px;
    width:260px;
}

#display{
    width:100%;
    height:40px;
    margin-bottom:10px;
    font-size:20px;
    text-align:right;
    padding:5px;
}

.botoes{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:5px;
}

button{
    height:40px;
    font-size:18px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#555;
}
</style>
</head>

<body>

<div class="calculadora">

<input type="text" id="display" disabled>

<div class="botoes">
<button onclick="limpar()">C</button>
<button onclick="apagar()">←</button>
<button onclick="adicionar('/')">/</button>
<button onclick="adicionar('*')">*</button>

<button onclick="adicionar('7')">7</button>
<button onclick="adicionar('8')">8</button>
<button onclick="adicionar('9')">9</button>
<button onclick="adicionar('-')">-</button>

<button onclick="adicionar('4')">4</button>
<button onclick="adicionar('5')">5</button>
<button onclick="adicionar('6')">6</button>
<button onclick="adicionar('+')">+</button>

<button onclick="adicionar('1')">1</button>
<button onclick="adicionar('2')">2</button>
<button onclick="adicionar('3')">3</button>
<button onclick="calcular()">=</button>

<button onclick="adicionar('0')">0</button>
<button onclick="adicionar('.')">.</button>
</div>

</div>

<script>

let display = document.getElementById("display");

function adicionar(valor){
    display.value += valor;
}

function limpar(){
    display.value = "";
}

function apagar(){
    display.value = display.value.slice(0,-1);
}

function calcular(){
    try{
        display.value = eval(display.value);
    }catch{
        display.value = "Erro";
    }
}

</script>

</body>
</html>
